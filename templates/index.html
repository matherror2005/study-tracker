<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker — 学习进度追踪</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ═══════════ 侧边栏 ═══════════ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">📚</span>
        <span class="brand-text">StudyTracker</span>
    </div>

    <nav class="sidebar-nav">
        <a class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
            <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
            <span>Dashboard</span>
        </a>
        <a class="nav-item" data-tab="courses" onclick="switchTab('courses')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span>Courses</span>
        </a>
        <a class="nav-item" data-tab="assignments" onclick="switchTab('assignments')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8.46 12.46l-1.42 1.42L5.3 13l-.7-.7 3.54-3.54.7.7L7.42 11H13v2H7.42l1.42 1.42.7.7-1.42 1.42-.7-.7 1.42-1.42z"/></svg>
            <span>Assignments</span>
        </a>
        <a class="nav-item" data-tab="review" onclick="switchTab('review')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
            <span>Review plan</span>
        </a>
        <a class="nav-item" data-tab="notes" onclick="switchTab('notes')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span>Notes</span>
        </a>
        <a class="nav-item" data-tab="timer" onclick="switchTab('timer')">
            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42C16.07 4.74 14.12 4 12 4c-4.97 0-9 4.03-9 9s4.02 9 9 9 9-4.03 9-9c0-2.12-.74-4.07-1.97-5.61zM12 20c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
            <span>Timer</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <small>数据本地存储 · SQLite</small>
    </div>
</aside>

<!-- ═══════════ 主内容区 ═══════════ -->
<div class="main-wrapper">
    <!-- 顶部栏 -->
    <header class="topbar">
        <button class="menu-toggle" onclick="toggleSidebar()" title="折叠侧边栏">
            <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="topbar-date" id="topbarDate"></div>
        <div class="topbar-countdown" id="topbarCountdown"></div>
    </header>

    <!-- 内容区（各 Tab 视图在此切换） -->
    <main class="content" id="mainContent"></main>
</div>

<!-- ═══════════ 模态框（添加/编辑 课程/作业/复习任务） ═══════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalBox" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" id="modalSaveBtn" onclick="submitModal()">保存</button>
        </div>
    </div>
</div>

<!-- ═══════════ AI 聊天悬浮窗 ═══════════ -->
<div class="chat-fab" id="chatFab" onclick="toggleChat()" title="AI 学习助理">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</div>

<!-- ═══════════ 快速启动计时悬浮按钮 ═══════════ -->
<div class="fab-timer" id="fabTimer" onclick="openQuickTimer()" title="快速开始学习">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    Start session
</div>

<!-- ═══════════ 快速启动计时 Modal ═══════════ -->
<div class="modal-overlay" id="quickTimerOverlay" onclick="closeQuickTimer(event)">
    <div class="modal" onclick="event.stopPropagation()" style="width:380px">
        <div class="modal-header">
            <h3>快速开始学习</h3>
            <button class="modal-close" onclick="closeQuickTimer()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">科目</label>
                <select class="form-select" id="qtCourse"></select>
            </div>
            <div class="form-group">
                <label class="form-label">时长</label>
                <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="btn btn-ghost btn-sm" onclick="setQuickDuration(25)">25分</button>
                    <button class="btn btn-ghost btn-sm" onclick="setQuickDuration(45)">45分</button>
                    <button class="btn btn-ghost btn-sm" onclick="setQuickDuration(60)">60分</button>
                    <button class="btn btn-ghost btn-sm" onclick="setQuickDuration(90)">90分</button>
                </div>
                <input class="form-input" type="number" id="qtCustomMin" placeholder="自定义分钟" min="1" max="240" style="margin-top:8px">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeQuickTimer()">取消</button>
            <button class="btn btn-primary" onclick="startQuickTimer()">开始学习</button>
        </div>
    </div>
</div>

<div class="chat-panel" id="chatPanel">
    <div class="chat-panel-header">
        <span>🤖 AI 学习助理</span>
        <button class="chat-panel-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-hints" id="chatHints">
        <span>💡 问学习问题</span>
        <span>🛠 说你想要的新功能</span>
        <span>📋 要复习建议</span>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="chat-msg chat-msg-ai">
            <div class="chat-msg-content">你好！我是你的学习助理 👋<br>有什么可以帮你的？</div>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="chatInput" class="chat-input" placeholder="输入消息..." rows="1"
                  onkeydown="handleChatKey(event)"></textarea>
        <button class="chat-send-btn" onclick="sendChatMessage()" title="发送">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
